name: lost_found_app
description: A complete Lost and Found app for Cameroon
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Icons
  cupertino_icons: ^1.0.6
  
  # State management
  provider: ^6.1.1
  
  # Image picker for photos
  image_picker: ^1.0.5
  
  # For unique IDs
  uuid: ^4.3.3
  
  # Maps and location
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  
  # Image caching and loading
  cached_network_image: ^3.3.0
  
  # For date picking
  intl: ^0.20.2
  
  # For making phone calls and opening URLs
  url_launcher: ^6.2.1
  
  # 🔥 FIREBASE PACKAGES - COMPATIBLE VERSIONS
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true