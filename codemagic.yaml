workflows:
  ios-workflow:
    name: iOS Build for iPhone
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_NAME: "Lost & Found Cameroon"
        BUNDLE_ID: "com.example.lostFoundApp"
    scripts:
      - name: Check environment
        script: | 
          echo "📱 Starting iOS build for device"
          pwd
          ls -la
          
      - name: Set iOS deployment target
        script: | 
          if [ -f "ios/Podfile" ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, '"'"'15.0'"'"'/' ios/Podfile
            echo "✅ Updated iOS deployment target to 15.0 in ios/Podfile"
          elif [ -f "Podfile" ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, '"'"'15.0'"'"'/' Podfile
            echo "✅ Updated iOS deployment target to 15.0 in Podfile"
          else
            echo "⚠️ Podfile not found, creating one..."
            mkdir -p ios
            echo "platform :ios, '15.0'" > ios/Podfile
            echo "target 'Runner' do" >> ios/Podfile
            echo "  use_frameworks!" >> ios/Podfile
            echo "  use_modular_headers!" >> ios/Podfile
            echo "  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))" >> ios/Podfile
            echo "end" >> ios/Podfile
            echo "✅ Created Podfile with iOS 15.0"
          fi
          
      - name: Clean and get packages
        script: | 
          flutter clean
          flutter pub get
          
      - name: Install Pods
        script: | 
          cd ios
          pod install --repo-update
          cd ..
          
      - name: Build IPA for device
        script: | 
          echo "🔨 Building IPA for iPhone..."
          flutter build ipa --release --no-codesign
          
      - name: Verify build artifacts
        script: | 
          echo "✅ Build completed! Checking artifacts..."
          ls -la build/ios/ipa/ || echo "No IPA found in build/ios/ipa/"
          ls -la build/ios/iphoneos/ || echo "No files found in build/ios/iphoneos/"
          echo "📦 Looking for IPA file..."
          
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/*.ipa
      
    publishing:
      email:
        recipients:
          - angelicandefo@example.com