workflows:
  ios-workflow:
    name: iOS Build for iPhone
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_NAME: "Lost & Found Cameroon"
        BUNDLE_ID: "com.example.lostFoundApp"
    scripts:
      - name: Check environment
        script: | 
          echo "📱 Starting iOS build for device"
          echo "Current directory: $(pwd)"
          echo "Files in current directory:"
          ls -la
          
      - name: Set iOS deployment target
        script: | 
          if [ -f "ios/Podfile" ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, '"'"'15.0'"'"'/' ios/Podfile
            echo "✅ Updated iOS deployment target to 15.0 in ios/Podfile"
          else
            echo "⚠️ ios/Podfile not found, but continuing build..."
          fi
          
      - name: Clean and get packages
        script: | 
          flutter clean
          flutter pub get
          
      - name: Install Pods
        script: | 
          cd ios
          pod install --repo-update
          cd ..
          
      - name: Build IPA for device
        script: | 
          echo "🔨 Building IPA for iPhone..."
          flutter build ipa --release --no-codesign
          echo "✅ Build command completed"
          
      - name: Find and list artifacts
        script: | 
          echo "🔍 Searching for IPA files..."
          echo "Checking build/ios/ipa/:"
          ls -la build/ios/ipa/ || echo "No files in build/ios/ipa/"
          
          echo "Checking build/ios/iphoneos/:"
          ls -la build/ios/iphoneos/ || echo "No files in build/ios/iphoneos/"
          
          echo "Checking build/ios/archive/:"
          ls -la build/ios/archive/ || echo "No files in build/ios/archive/"
          
          echo "Checking entire build directory:"
          find build -name "*.ipa" -type f || echo "No IPA files found anywhere"
          
          echo "📦 If IPA exists, it will be captured in artifacts"
          
    artifacts:
      - build/ios/ipa/**/*.ipa
      - build/ios/iphoneos/**/*.ipa
      - build/**/*.ipa
      - build/ios/archive/**/*.xcarchive
      
    publishing:
      email:
        recipients:
          - angelicandefo@gmail.com